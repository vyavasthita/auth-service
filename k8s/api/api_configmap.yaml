apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: tic-tac-toe
  labels:
    app: api
    app.kubernetes.io/part-of: tic-tac-toe
data:
  OTEL_EXPORTER_LOGS_ENDPOINT: "http://otel-collector.oaas-observability.svc.cluster.local:4318/v1/logs"
  OTEL_EXPORTER_TRACES_ENDPOINT: "http://otel-collector.oaas-observability.svc.cluster.local:4318/v1/traces"
  OTEL_EXPORTER_METRICS_ENDPOINT: "http://otel-collector.oaas-observability.svc.cluster.local:4318/v1/metrics"
  OTEL_SERVICE_NAME: "tic-tac-toe-api"
  RATE_LIMITED_LOG_INTERVAL_SECONDS: "2"
  LOGGING_BACKEND: "opensearch"
  TRACING_BACKEND: "tempo"
  METRICS_BACKEND: "prometheus"
  DATABASE_HOST: "database.tic-tac-toe.svc.cluster.local"
  DATABASE_PORT: "3306"
