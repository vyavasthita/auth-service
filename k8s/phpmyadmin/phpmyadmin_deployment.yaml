# -----------------------------------------------------------------------------------
# Tic-Tac-Toe: phpMyAdmin Deployment
#
# Purpose:
#   - Deploys the phpMyAdmin web UI in the tic-tac-toe namespace for MySQL management.
#   - Connects to the MySQL database using credentials from Kubernetes secrets.
#
# How it works:
#   - Runs the phpMyAdmin container, exposing port 80.
#   - Sets environment variables for database connection, including secret-based password.
#   - Readiness/liveness probes ensure phpMyAdmin is healthy before service exposure.
#
# Consumers:
#   - Consumed by kubectl/apply and the K8s controller to create the phpMyAdmin pod.
#   - Maintainers: Update this file to change image version, environment, or probes.
#   - phpMyAdmin pod is accessed via the corresponding ClusterIP service.
# -----------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
  namespace: tic-tac-toe
  labels:
    app: phpmyadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
    spec:
      containers:
        - name: phpmyadmin
          image: phpmyadmin:5.2.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: PMA_HOST
              value: database
            - name: PMA_PORT
              value: "3306"
            - name: PMA_USER
              value: root
            - name: PMA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tic-tac-toe-secrets
                  key: MYSQL_ROOT_PASSWORD
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
