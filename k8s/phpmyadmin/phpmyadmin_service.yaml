# -----------------------------------------------------------------------------------
# Tic-Tac-Toe: phpMyAdmin Service
#
# Purpose:
#   - Exposes the phpMyAdmin web UI within the Kubernetes cluster on port 8080.
#   - Allows users and developers to access the MySQL database via a browser.
#
# How it works:
#   - Selects pods with label app: phpmyadmin and exposes them via ClusterIP service.
#   - Port 8080 is mapped to the phpMyAdmin container's port 80.
#   - For local access, use kubectl port-forward to map this service to localhost.
#
# Consumers:
#   - Consumed by kubectl/apply and the K8s controller to create the service.
#   - Maintainers: Update this file to change service type, ports, or selectors.
#   - phpMyAdmin UI is accessed by users, developers, and automation via this service.
# -----------------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin
  namespace: tic-tac-toe
  labels:
    app: phpmyadmin
spec:
  selector:
    app: phpmyadmin
  ports:
    - name: http
      port: 8080
      targetPort: 80
      protocol: TCP
  type: ClusterIP
