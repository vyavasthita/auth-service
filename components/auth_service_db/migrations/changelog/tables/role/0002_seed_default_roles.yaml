databaseChangeLog:
  - changeSet:
      id: "0002-seed-role-user"
      author: dilipsharma
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM roles WHERE role_name = 'user'
      changes:
        - sql:
            sql: >
              INSERT INTO roles (role_id, role_name, created_at, modified_at)
              VALUES (UNHEX(REPLACE('a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d', '-', '')), 'user', NOW(), NOW())
      comment: Seed default 'user' role

  - changeSet:
      id: "0002-seed-role-admin"
      author: dilipsharma
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM roles WHERE role_name = 'admin'
      changes:
        - sql:
            sql: >
              INSERT INTO roles (role_id, role_name, created_at, modified_at)
              VALUES (UNHEX(REPLACE('b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e', '-', '')), 'admin', NOW(), NOW())
      comment: Seed default 'admin' role
